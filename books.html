<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - Book Lending System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Online Book Lending System</h1>
            <nav>
                <span id="welcomeMessage"></span>
                <button id="logoutBtn" class="btn btn-small">Logout</button>
            </nav>
        </header>
        
        <main>
            <div class="books-header">
                <h2>Browse Books</h2>
                <div class="controls">
                    <button id="showAllBooks" class="btn btn-secondary active">All Books</button>
                    <button id="showMyBooks" class="btn btn-secondary">My Borrowed Books</button>
                    <button id="showHistory" class="btn btn-secondary">Borrowing History</button>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by title, author, or category...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="IT">IT</button>
                    <button class="filter-btn" data-category="Fiction">Fiction</button>
                    <button class="filter-btn" data-category="Business">Business</button>
                </div>
            </div>
            
            <!-- All Books View -->
            <div id="allBooksView" class="view-section active">
                <div id="booksGrid" class="books-grid">
                    <!-- Books will be dynamically loaded here -->
                </div>
            </div>
            
            <!-- My Borrowed Books View -->
            <div id="myBooksView" class="view-section">
                <div id="borrowedBooksGrid" class="books-grid">
                    <!-- Borrowed books will be dynamically loaded here -->
                </div>
            </div>
            
            <!-- Borrowing History View -->
            <div id="historyView" class="view-section">
                <div class="history-container">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Book Title</th>
                                <th>Author</th>
                                <th>Borrowed On</th>
                                <th>Status</th>
                                <th>Returned On</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- History will be dynamically loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 Online Book Lending System. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="auth.js"></script>
    <script src="books.js"></script>
    <script src="app.js"></script>
</body>
</html>
